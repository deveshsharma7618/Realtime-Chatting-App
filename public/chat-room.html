<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Messenger</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width: 80vw;
    height:90vh;
    background:#fff;
    display:flex;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

/* Sidebar */

.sidebar{
    width:320px;
    background:#1f2937;
    color:#fff;
    overflow-y:auto;
}

.sidebar-header{
    padding:20px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    font-size:22px;
    font-weight:bold;
}

.friend{
    display:flex;
    align-items:center;
    padding:15px;
    cursor:pointer;
    transition:0.3s;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.friend:hover{
    background:#374151;
}

.friend.active{
    background:#4b5563;
}

.avatar-wrapper{
    position:relative;
}

.avatar{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
}

.online{
    width:12px;
    height:12px;
    background:#22c55e;
    border-radius:50%;
    position:absolute;
    right:2px;
    bottom:4px;
    border:2px solid #1f2937;
}

.friend-info{
    margin-left:12px;
}

.friend-name{
    font-weight:600;
    font-size:15px;
}

.friend-email{
    font-size:12px;
    color:#cbd5e1;
    margin-top:4px;
}

/* Chat Area */

.chat-area{
    flex:1;
    display:flex;
    flex-direction:column;
}

.chat-header{
    display:flex;
    align-items:center;
    padding:15px 20px;
    border-bottom:1px solid #e5e7eb;
}

.chat-header img{
    width:45px;
    height:45px;
    border-radius:50%;
}

.chat-user{
    margin-left:12px;
}

.chat-user h3{
    font-size:18px;
}

.chat-user span{
    color:#22c55e;
    font-size:13px;
}

.messages{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#f8fafc;
}

/* Message Bubbles */

.message{
    max-width:70%;
    padding:12px 16px;
    border-radius:15px;
    margin-bottom:12px;
    line-height:1.4;
    word-wrap:break-word;
}

.received{
    background:#e5e7eb;
    color:#111827;
    align-self:flex-start;
    border-bottom-left-radius:5px;
}

.sent{
    background:#2563eb;
    color:#fff;
    margin-left:auto;
    border-bottom-right-radius:5px;
}

.time{
    display:block;
    font-size:11px;
    margin-top:5px;
    opacity:0.7;
}

/* Input */

.chat-input{
    display:flex;
    padding:15px;
    border-top:1px solid #e5e7eb;
    background:#fff;
}

.chat-input input{
    flex:1;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:8px;
    outline:none;
}

.chat-input button{
    margin-left:10px;
    padding:12px 20px;
    border:none;
    background:#2563eb;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
}

.chat-input button:hover{
    background:#1d4ed8;
}

@media(max-width:768px){

    .chat-container{
        width:100%;
        height:100vh;
        border-radius:0;
    }

    .sidebar{
        width:280px;
    }
}
</style>
</head>

<body>

<div class="chat-container">

    <!-- Friends List -->
    <div class="sidebar">

        <div class="sidebar-header">
            Friends
        </div>

        <div class="friend active">
            <div class="avatar-wrapper">
                <img src="https://i.pravatar.cc/100?img=1" class="avatar">
                <span class="online"></span>
            </div>

            <div class="friend-info">
                <div class="friend-name">John Smith</div>
                <div class="friend-email">john@example.com</div>
            </div>
        </div>

        <div class="friend">
            <div class="avatar-wrapper">
                <img src="https://i.pravatar.cc/100?img=2" class="avatar">
            </div>

            <div class="friend-info">
                <div class="friend-name">Sarah Wilson</div>
                <div class="friend-email">sarah@example.com</div>
            </div>
        </div>

        <div class="friend">
            <div class="avatar-wrapper">
                <img src="https://i.pravatar.cc/100?img=3" class="avatar">
                <span class="online"></span>
            </div>

            <div class="friend-info">
                <div class="friend-name">Michael Brown</div>
                <div class="friend-email">michael@example.com</div>
            </div>
        </div>

    </div>

    <!-- Chat Section -->
    <div class="chat-area">

        <div class="chat-header">
            <img src="https://i.pravatar.cc/100?img=1">
            <div class="chat-user">
                <h3>John Smith</h3>
                <span>Online</span>
            </div>
        </div>

        <div class="messages" id="messages">
        </div>

        <form class="chat-form chat-input" id="chat-form">
            <input type="text" placeholder="Type your message..." id="message-input">
            <button type="submit">Send</button>
        </form>

    </div>

</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js" integrity="sha512-8BHxHDLsOHx+flIrQ0DrZcea7MkHqRU5GbTHmbdzMRnAaoCIkZ97PqZcXJkKZckMMhqfoeaJE+DNUVuyoQsO3Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="socket-client.js"></script>
</body>
</html>
