<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    color-scheme: dark;
    --bg: #030712;
    --panel: rgba(17, 24, 39, 0.75);
    --panel-border: rgba(255, 255, 255, 0.08);
    --text: #f3f4f6;
    --muted: #9ca3af;
    --accent-start: #6366f1;
    --accent-end: #0ea5e9;
    --accent-gradient: linear-gradient(135deg, var(--accent-start), var(--accent-end));
    --success: #10b981;
    --danger: #ef4444;
    --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    --font: 'Plus Jakarta Sans', sans-serif;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: var(--font);
}

body{
    background: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.12), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(14, 165, 233, 0.1), transparent 40%),
        #070a13;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color: var(--text);
    overflow: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: 
        linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px), 
        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
    z-index: -1;
}

.chat-container{
    width: 85vw;
    height: 85vh;
    max-width: 1400px;
    max-height: 900px;
    background: var(--panel);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--panel-border);
    display:flex;
    border-radius:24px;
    overflow:hidden;
    box-shadow: var(--shadow);
}

/* Sidebar */

.sidebar{
    width:340px;
    background: rgba(10, 15, 30, 0.4);
    border-right: 1px solid rgba(255, 255, 255, 0.06);
    display: flex;
    flex-direction: column;
    overflow-y:auto;
}

.sidebar-header{
    padding:24px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    font-size:20px;
    font-weight:700;
    letter-spacing: -0.02em;
}

.search-bar {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
}

#search_contact {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.2);
    color: var(--text);
    outline: none;
    font-size: 13px;
    font-family: var(--font);
    transition: all 0.2s;
}

#search_contact:focus {
    border-color: var(--accent-start);
    background: rgba(0, 0, 0, 0.35);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}

.friend{
    display:flex;
    align-items:center;
    padding:16px 20px;
    cursor:pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border-bottom: 1px solid rgba(255,255,255,0.03);
}

.friend:hover{
    background: rgba(255, 255, 255, 0.04);
}

.friend.active{
    background: rgba(255, 255, 255, 0.08);
}

.avatar-wrapper{
    position:relative;
    display: flex;
    align-items: center;
}

.avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    object-fit:cover;
    border: 2px solid rgba(255, 255, 255, 0.1);
}

.online{
    width:12px;
    height:12px;
    background: var(--success);
    border-radius: 50%;
    position: absolute;
    right: -2px;
    bottom: -2px;
    border: 2px solid #0d1222;
    box-shadow: 0 0 8px var(--success);
}

.offline{
    width:12px;
    height:12px;
    background: var(--muted);
    border-radius: 50%;
    position: absolute;
    right: -2px;
    bottom: -2px;
    border: 2px solid #0d1222;
    box-shadow: none;
}

.friend-info{
    margin-left:14px;
    overflow: hidden;
}

.friend-name{
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
}

.friend-email{
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
}

/* Chat Area */

.chat-area{
    flex:1;
    display:flex;
    flex-direction:column;
    background: rgba(17, 24, 39, 0.2);
}

.chat-header{
    display:flex;
    align-items:center;
    padding:16px 24px;
    border-bottom:1px solid rgba(255, 255, 255, 0.06);
    background: rgba(10, 15, 30, 0.2);
}

.chat-header img{
    width:44px;
    height:44px;
    border-radius:50%;
    border: 2px solid rgba(255, 255, 255, 0.1);
}

.chat-user{
    margin-left:14px;
}

.chat-user h3{
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
}

.chat-user span{
    color: var(--success);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
}

.messages{
    flex:1;
    padding:24px;
    overflow-y:auto;
    background: transparent;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* Message custom scrollbar */
.messages::-webkit-scrollbar {
    width: 6px;
}
.messages::-webkit-scrollbar-track {
    background: transparent;
}
.messages::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 99px;
}
.messages::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.15);
}

/* Message Bubbles */

.message{
    max-width:65%;
    padding:12px 18px;
    border-radius:18px;
    line-height:1.5;
    font-size:14px;
    position: relative;
    animation: fadeIn 0.25s ease-out;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.received{
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.05);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

.sent{
    background: var(--accent-gradient);
    color: #ffffff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
}

.time{
    display:block;
    font-size:10px;
    margin-top: 4px;
    opacity: 0.65;
    text-align: right;
}

/* Input */

.chat-input{
    display:flex;
    padding:20px 24px;
    border-top:1px solid rgba(255, 255, 255, 0.06);
    background: rgba(10, 15, 30, 0.2);
    gap: 12px;
}

.chat-input input{
    flex: 1;
    padding: 12px 16px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    background: rgba(0, 0, 0, 0.25);
    color: var(--text);
    outline: none;
    font-size: 14px;
    font-family: var(--font);
    transition: all 0.2s;
}

.chat-input input:focus {
    border-color: var(--accent-start);
    background: rgba(0, 0, 0, 0.35);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}

.chat-input button{
    padding: 12px 24px;
    border: none;
    background: var(--accent-gradient);
    color: #ffffff;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 14px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.chat-input button:hover{
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.45);
}

@media(max-width:768px){
    .chat-container{
        width:100vw;
        height:100vh;
        border-radius:0;
        border: none;
    }
    .sidebar{
        width:280px;
    }
}

/* Sidebar Tab and Request Styling */
.sidebar-tabs {
    display: flex;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(0, 0, 0, 0.1);
}
.sidebar-tab {
    flex: 1;
    padding: 16px;
    background: none;
    border: none;
    color: var(--muted);
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
}
.sidebar-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent-start);
    background: rgba(255, 255, 255, 0.02);
}
.sidebar-tab:hover:not(.active) {
    color: var(--text);
    background: rgba(255, 255, 255, 0.01);
}
.requests-badge {
    background: var(--danger);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: 6px;
    display: none;
}
.search-result-box {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    background: rgba(99, 102, 241, 0.04);
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.search-result-user {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.search-result-info {
    overflow: hidden;
}
.search-result-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
}
.search-result-email {
    font-size: 11px;
    color: var(--muted);
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
}
.search-result-btn {
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: var(--accent-gradient);
    color: white;
    transition: all 0.2s;
}
.search-result-btn:hover {
    transform: translateY(-1px);
}
.search-result-btn.secondary-btn {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.1);
}
.search-result-btn.secondary-btn:hover {
    background: rgba(255, 255, 255, 0.12);
}
.request-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    animation: fadeIn 0.2s ease;
}
.request-info {
    overflow: hidden;
}
.request-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
}
.request-email {
    font-size: 11px;
    color: var(--muted);
}
.request-actions {
    display: flex;
    gap: 6px;
}
.accept-btn {
    background: var(--success);
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
}
.accept-btn:hover {
    transform: translateY(-1px);
    opacity: 0.9;
}
.reject-btn {
    background: var(--danger);
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
}
.reject-btn:hover {
    transform: translateY(-1px);
    opacity: 0.9;
}
.list-placeholder {
    padding: 32px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
}
</style>
</head>

<body>

<div class="chat-container">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">

        <div class="sidebar-tabs">
            <button class="sidebar-tab active" id="tab-contacts">Contacts</button>
            <button class="sidebar-tab" id="tab-requests">Requests <span id="requests-badge" class="requests-badge">0</span></button>
        </div>

        <form action="" class="search-bar" id="search-form">
            <input placeholder="Search user by email or username..." type="text" id="search_contact" name="search_contact" />
        </form>

        <div id="search-result" style="display:none;"></div>

        <!-- Dynamic Contacts List -->
        <div id="contacts-list" class="list-container"></div>

        <!-- Dynamic Pending Requests List -->
        <div id="requests-list" class="list-container" style="display:none;"></div>

    </div>

    <!-- Chat Section -->
    <div class="chat-area">

        <!-- Active Chat Header (Hidden initially) -->
        <div class="chat-header" id="chat-header" style="display:none;">
            <img src="https://i.pravatar.cc/100?img=1" id="chat-avatar">
            <div class="chat-user">
                <h3 id="chat-username">Name</h3>
                <span id="chat-status"><span class="online" style="position:static; display:inline-block; margin-right:6px;"></span>Online</span>
            </div>
        </div>

        <!-- Empty Chat Placeholder -->
        <div class="chat-placeholder" id="chat-placeholder" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; color:var(--muted); gap:12px;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.35;">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <p style="font-weight: 500; font-size: 14px; opacity: 0.7;">Select an accepted contact to start chatting</p>
        </div>

        <div class="messages" id="messages" style="display:none;">
        </div>

        <form class="chat-form chat-input" id="chat-form">
            <input type="text" placeholder="Select a contact to message" id="message-input" disabled>
            <button type="submit" id="send-button" disabled>Send</button>
        </form>

    </div>

</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js" integrity="sha512-8BHxHDLsOHx+flIrQ0DrZcea7MkHqRU5GbTHmbdzMRnAaoCIkZ97PqZcXJkKZckMMhqfoeaJE+DNUVuyoQsO3Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="contacts.js"></script>
    <script src="socket-client.js"></script>
</body>
</html>
